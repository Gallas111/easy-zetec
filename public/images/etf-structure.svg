<svg xmlns="http://www.w3.org/2000/svg" width="800" height="320" viewBox="0 0 800 320">
  <rect width="800" height="320" rx="16" fill="#FAF5FF"/>
  <!-- Title -->
  <text x="400" y="35" font-family="Arial" font-size="16" font-weight="bold" fill="#4C1D95" text-anchor="middle">ETF = 여러 종목을 한 바구니에!</text>
  <!-- Individual stocks -->
  <g transform="translate(50, 60)">
    <rect x="0" y="0" width="200" height="220" rx="12" fill="white" stroke="#E5E7EB" stroke-width="1.5"/>
    <text x="100" y="30" font-family="Arial" font-size="13" font-weight="bold" fill="#6B7280" text-anchor="middle">개별 주식 매수</text>
    <rect x="20" y="45" width="160" height="32" rx="6" fill="#FEF2F2"/>
    <text x="100" y="66" font-family="Arial" font-size="12" fill="#991B1B" text-anchor="middle">삼성전자 1주 = 7만원</text>
    <rect x="20" y="85" width="160" height="32" rx="6" fill="#FEF2F2"/>
    <text x="100" y="106" font-family="Arial" font-size="12" fill="#991B1B" text-anchor="middle">SK하이닉스 1주 = 20만원</text>
    <rect x="20" y="125" width="160" height="32" rx="6" fill="#FEF2F2"/>
    <text x="100" y="146" font-family="Arial" font-size="12" fill="#991B1B" text-anchor="middle">현대차 1주 = 25만원</text>
    <rect x="20" y="165" width="160" height="32" rx="6" fill="#FEF2F2"/>
    <text x="100" y="186" font-family="Arial" font-size="12" fill="#991B1B" text-anchor="middle">... 200개 종목?!</text>
    <text x="100" y="215" font-family="Arial" font-size="11" fill="#DC2626" text-anchor="middle">수천만원 필요 😰</text>
  </g>
  <!-- VS -->
  <text x="330" y="180" font-family="Arial" font-size="28" font-weight="bold" fill="#8B5CF6" text-anchor="middle">VS</text>
  <!-- ETF -->
  <g transform="translate(400, 60)">
    <rect x="0" y="0" width="340" height="220" rx="12" fill="white" stroke="#8B5CF6" stroke-width="2"/>
    <text x="170" y="30" font-family="Arial" font-size="13" font-weight="bold" fill="#8B5CF6" text-anchor="middle">KODEX 200 ETF 1주</text>
    <rect x="20" y="50" width="300" height="70" rx="10" fill="#F5F3FF"/>
    <text x="170" y="75" font-family="Arial" font-size="13" fill="#4C1D95" text-anchor="middle">코스피 상위 200개 기업에</text>
    <text x="170" y="100" font-family="Arial" font-size="15" font-weight="bold" fill="#8B5CF6" text-anchor="middle">한 번에 분산 투자! 🎯</text>
    <rect x="20" y="135" width="140" height="32" rx="6" fill="#ECFDF5"/>
    <text x="90" y="156" font-family="Arial" font-size="12" fill="#065F46" text-anchor="middle">💰 약 3~4만원</text>
    <rect x="170" y="135" width="150" height="32" rx="6" fill="#ECFDF5"/>
    <text x="245" y="156" font-family="Arial" font-size="12" fill="#065F46" text-anchor="middle">📉 수수료 0.05%</text>
    <rect x="20" y="178" width="300" height="28" rx="6" fill="#8B5CF6"/>
    <text x="170" y="197" font-family="Arial" font-size="13" font-weight="bold" fill="white" text-anchor="middle">소액으로 분산투자 가능! ✅</text>
  </g>
</svg>
