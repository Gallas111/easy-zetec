<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e1b4b"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- 배경 장식 -->
  <circle cx="1080" cy="100" r="300" fill="rgba(59,130,246,0.05)"/>
  <circle cx="80" cy="580" r="180" fill="rgba(59,130,246,0.03)"/>

  <!-- 카테고리 뱃지 -->
  <rect x="80" y="65" width="121.6" height="38" rx="19" fill="#2563EB"/>
  <text x="140.8" y="90" font-family="Arial,sans-serif" font-size="16" font-weight="bold" fill="white" text-anchor="middle">재테크 기초</text>

  <!-- 메인 타이틀 -->
  <text x="80" y="205" font-family="Arial,sans-serif" font-size="68" font-weight="900" fill="white">월급만 스쳐가는 당신을 위한!</text>

  <!-- 강조 서브타이틀 -->
  <rect x="80" y="228" width="721.9999999999999" height="64" rx="8" fill="#FBBF24"/>
  <text x="440.99999999999994" y="276" font-family="Arial,sans-serif" font-size="42" font-weight="900" fill="#0f172a" text-anchor="middle">초보도 성공하는 짠테크 비법 7가지</text>

  <!-- 설명 -->
  <text x="80" y="355" font-family="Arial,sans-serif" font-size="22" fill="rgba(255,255,255,0.55)">월급이 통장을 스쳐가는 기분, 이젠 잊으세요! 재테크 초보도 쉽게 시작할 수 있는 짠테크의...</text>

  <!-- 태그 카드 -->
  <rect x="80" y="420" width="220" height="80" rx="12" fill="rgba(255,255,255,0.05)" stroke="rgba(59,130,246,0.2)" stroke-width="1"/>
  <text x="190" y="468" font-family="Arial,sans-serif" font-size="24" font-weight="900" fill="#FBBF24" text-anchor="middle">짠테크</text>
  <rect x="320" y="420" width="220" height="80" rx="12" fill="rgba(255,255,255,0.05)" stroke="rgba(59,130,246,0.2)" stroke-width="1"/>
  <text x="430" y="468" font-family="Arial,sans-serif" font-size="24" font-weight="900" fill="#34D399" text-anchor="middle">절약</text>
  <rect x="560" y="420" width="220" height="80" rx="12" fill="rgba(255,255,255,0.05)" stroke="rgba(59,130,246,0.2)" stroke-width="1"/>
  <text x="670" y="468" font-family="Arial,sans-serif" font-size="24" font-weight="900" fill="#60A5FA" text-anchor="middle">재테크</text>

  <!-- 하단 브랜드 -->
  <text x="80" y="565" font-family="Arial,sans-serif" font-size="14" fill="rgba(255,255,255,0.3)">쉬운재테크 · easyzetec.com</text>
</svg>