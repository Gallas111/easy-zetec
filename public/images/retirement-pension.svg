      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e1b4b"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- 배경 장식 -->
  <circle cx="1080" cy="100" r="300" fill="rgba(139,92,246,0.05)"/>
