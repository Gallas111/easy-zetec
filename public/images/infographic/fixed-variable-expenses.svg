  <text x="60" y="58" font-family="GmarketSansTTF,Arial,sans-serif" font-size="22" font-weight="bold" fill="white">월급이 스쳐가는 당신? 고정/변동지출 10분만 구분하면 돈이 쌓...</text>
  <text x="40" y="95" font-family="GmarketSansTTF,Arial,sans-serif" font-size="14" fill="rgba(255,255,255,0.4)">이 글에서 다루는 핵심 내용</text>

  
    <rect x="40" y="130" width="720" height="72" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(59,130,246,0.15)" stroke-width="1"/>
