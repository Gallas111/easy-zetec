      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e1b4b"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- 배경 장식 -->
  <circle cx="1080" cy="100" r="300" fill="rgba(139,92,246,0.05)"/>
  <circle cx="80" cy="580" r="180" fill="rgba(139,92,246,0.03)"/>

  <!-- 카테고리 뱃지 -->
  <rect x="80" y="65" width="69.6" height="38" rx="19" fill="#7C3AED"/>
  <text x="114.8" y="90" font-family="GmarketSansTTF,Arial,sans-serif" font-size="16" font-weight="bold" fill="white" text-anchor="middle">투자</text>

  <!-- 메인 타이틀 -->
  <text x="80" y="205" font-family="GmarketSansTTF,Arial,sans-serif" font-size="52" font-weight="900" fill="white">주식 초보도 걱정 NO! 단돈 1만...</text>

  <!-- 강조 서브타이틀 -->
  <rect x="80" y="228" width="374.24" height="64" rx="8" fill="#FBBF24"/>
  <text x="267.12" y="276" font-family="GmarketSansTTF,Arial,sans-serif" font-size="42" font-weight="900" fill="#0f172a" text-anchor="middle">이것만 알면 끝!</text>

  <!-- 설명 -->
  <text x="80" y="355" font-family="GmarketSansTTF,Arial,sans-serif" font-size="22" fill="rgba(255,255,255,0.55)">주식 초보도 쉽게 시작할 수 있는 ETF 투자의 모든 것! 단돈 1만원으로 똑똑하게 부자되...</text>

  <!-- 태그 카드 -->
  <rect x="80" y="420" width="220" height="80" rx="12" fill="rgba(255,255,255,0.05)" stroke="rgba(139,92,246,0.2)" stroke-width="1"/>
  <text x="190" y="468" font-family="GmarketSansTTF,Arial,sans-serif" font-size="24" font-weight="900" fill="#FBBF24" text-anchor="middle">ETF</text>
  <rect x="320" y="420" width="220" height="80" rx="12" fill="rgba(255,255,255,0.05)" stroke="rgba(139,92,246,0.2)" stroke-width="1"/>
  <text x="430" y="468" font-family="GmarketSansTTF,Arial,sans-serif" font-size="24" font-weight="900" fill="#34D399" text-anchor="middle">투자 입문</text>
  <rect x="560" y="420" width="220" height="80" rx="12" fill="rgba(255,255,255,0.05)" stroke="rgba(139,92,246,0.2)" stroke-width="1"/>
  <text x="670" y="468" font-family="GmarketSansTTF,Arial,sans-serif" font-size="24" font-weight="900" fill="#60A5FA" text-anchor="middle">분산투자</text>

  <!-- 하단 브랜드 -->
  <text x="80" y="565" font-family="GmarketSansTTF,Arial,sans-serif" font-size="14" fill="rgba(255,255,255,0.3)">쉬운재테크 · easyzetec.com</text>
