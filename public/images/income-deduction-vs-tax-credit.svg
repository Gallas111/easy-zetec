  <rect x="560" y="420" width="220" height="80" rx="12" fill="rgba(255,255,255,0.05)" stroke="rgba(245,158,11,0.2)" stroke-width="1"/>
  <text x="670" y="468" font-family="GmarketSansTTF,Arial,sans-serif" font-size="24" font-weight="900" fill="#60A5FA" text-anchor="middle">세금</text>

