  <rect x="60" y="50" width="100" height="36" rx="18" fill="rgba(255,255,255,0.2)"/>
  <text x="110" y="74" font-family="Arial" font-size="14" font-weight="bold" fill="white" text-anchor="middle">📚 재테크 기초</text>
  <text x="80" y="250" font-family="Arial,sans-serif" font-size="56" font-weight="bold" fill="white">재테크 시작하기</text>
  <text x="80" y="330" font-family="Arial,sans-serif" font-size="44" font-weight="bold" fill="#FCD34D">완전 초보를 위한</text>
  <text x="80" y="390" font-family="Arial,sans-serif" font-size="44" font-weight="bold" fill="#FCD34D">5단계 가이드</text>
  <text x="80" y="450" font-family="Arial,sans-serif" font-size="22" fill="rgba(255,255,255,0.7)">비상금 만들기부터 첫 투자까지</text>
  <rect x="80" y="500" width="56" height="56" rx="14" fill="rgba(255,255,255,0.2)"/>
  <text x="108" y="536" font-family="Arial" font-size="28" font-weight="bold" fill="white" text-anchor="middle">Z</text>
  <text x="150" y="535" font-family="Arial" font-size="18" fill="rgba(255,255,255,0.7)">쉬운재테크</text>
