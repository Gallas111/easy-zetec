    <line x1="100" y1="100" x2="50" y2="100" stroke="rgba(255,255,255,0.2)" stroke-width="2"/>
    <line x1="50" y1="180" x2="150" y2="160" stroke="rgba(255,255,255,0.2)" stroke-width="2"/>
    <line x1="150" y1="240" x2="80" y2="240" stroke="rgba(255,255,255,0.2)" stroke-width="2"/>
