<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6"/>
      <stop offset="100%" style="stop-color:#1E3A8A"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg1)"/>
  <circle cx="1000" cy="150" r="250" fill="rgba(255,255,255,0.05)"/>
  <circle cx="200" cy="500" r="180" fill="rgba(255,255,255,0.05)"/>
  <!-- Step icons -->
  <g transform="translate(800, 200)">
    <circle cx="0" cy="0" r="40" fill="rgba(255,255,255,0.15)"/>
    <text x="0" y="8" font-family="Arial" font-size="28" fill="white" text-anchor="middle">1</text>
    <circle cx="100" cy="60" r="40" fill="rgba(255,255,255,0.15)"/>
    <text x="100" y="68" font-family="Arial" font-size="28" fill="white" text-anchor="middle">2</text>
    <circle cx="50" cy="140" r="40" fill="rgba(255,255,255,0.15)"/>
    <text x="50" y="148" font-family="Arial" font-size="28" fill="white" text-anchor="middle">3</text>
    <circle cx="150" cy="200" r="40" fill="rgba(255,255,255,0.15)"/>
    <text x="150" y="208" font-family="Arial" font-size="28" fill="white" text-anchor="middle">4</text>
