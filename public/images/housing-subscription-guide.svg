<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e1b4b"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- 배경 장식 -->
  <circle cx="1080" cy="100" r="300" fill="rgba(239,68,68,0.05)"/>
  <circle cx="80" cy="580" r="180" fill="rgba(239,68,68,0.03)"/>

  <!-- 카테고리 뱃지 -->
  <rect x="80" y="65" width="84" height="38" rx="19" fill="#DC2626"/>
  <text x="122" y="90" font-family="Arial,sans-serif" font-size="16" font-weight="bold" fill="white" text-anchor="middle">부동산</text>

  <!-- 메인 타이틀 -->
  <text x="80" y="205" font-family="Arial,sans-serif" font-size="72" font-weight="900" fill="white">청약통장</text>

  <!-- 강조 서브타이틀 -->
  <rect x="80" y="228" width="932.3" height="56" rx="8" fill="#FBBF24"/>
  <text x="546.15" y="269" font-family="Arial,sans-serif" font-size="34" font-weight="900" fill="#0f172a" text-anchor="middle">그냥 두면 손해! 내 집 마련 꿈, 당첨까지 '쉬운' 로드맵</text>

  <!-- 설명 -->
  <text x="80" y="355" font-family="Arial,sans-serif" font-size="22" fill="rgba(255,255,255,0.55)">내 집 마련의 꿈, 청약통장으로 현실로! 가입부터 납입 전략, 가점제·추첨제, 특별공급까지...</text>

  <!-- 태그 카드 -->
  <rect x="80" y="420" width="220" height="80" rx="12" fill="rgba(255,255,255,0.05)" stroke="rgba(239,68,68,0.2)" stroke-width="1"/>
  <text x="190" y="468" font-family="Arial,sans-serif" font-size="24" font-weight="900" fill="#FBBF24" text-anchor="middle">청약통장</text>
  <rect x="320" y="420" width="220" height="80" rx="12" fill="rgba(255,255,255,0.05)" stroke="rgba(239,68,68,0.2)" stroke-width="1"/>
  <text x="430" y="468" font-family="Arial,sans-serif" font-size="24" font-weight="900" fill="#34D399" text-anchor="middle">주택청약</text>
  <rect x="560" y="420" width="220" height="80" rx="12" fill="rgba(255,255,255,0.05)" stroke="rgba(239,68,68,0.2)" stroke-width="1"/>
  <text x="670" y="468" font-family="Arial,sans-serif" font-size="24" font-weight="900" fill="#60A5FA" text-anchor="middle">특별공급</text>

  <!-- 하단 브랜드 -->
  <text x="80" y="565" font-family="Arial,sans-serif" font-size="14" fill="rgba(255,255,255,0.3)">쉬운재테크 · easyzetec.com</text>
</svg>