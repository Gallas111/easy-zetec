<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1305"/>
      <stop offset="100%" style="stop-color:#3d2e0a"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- 배경 장식 -->
  <circle cx="1080" cy="100" r="300" fill="rgba(245,158,11,0.05)"/>
  <circle cx="80" cy="580" r="180" fill="rgba(245,158,11,0.03)"/>

  <!-- 카테고리 뱃지 -->
  <rect x="80" y="65" width="69.6" height="38" rx="19" fill="#D97706"/>
  <text x="114.8" y="90" font-family="GmarketSansTTF,Arial,sans-serif" font-size="16" font-weight="bold" fill="white" text-anchor="middle">절세</text>

  <!-- 메인 타이틀 -->
  <text x="80" y="205" font-family="GmarketSansTTF,Arial,sans-serif" font-size="52" font-weight="900" fill="white">주택임대소득 분리과세 vs 종합과...</text>

  <!-- 강조 서브타이틀 -->
  <rect x="80" y="228" width="950" height="64" rx="8" fill="#FBBF24"/>
  <text x="555" y="276" font-family="GmarketSansTTF,Arial,sans-serif" font-size="42" font-weight="900" fill="#0f172a" text-anchor="middle">마감 전 어느 쪽이 유리한지 시뮬레이션 5가지</text>

  <!-- 설명 -->
  <text x="80" y="355" font-family="GmarketSansTTF,Arial,sans-serif" font-size="22" fill="rgba(255,255,255,0.55)">주택임대 수입 2천만원 이하라면 분리과세 14%와 종합과세 6~45% 중 선택할 수 있어요...</text>

  <!-- 태그 카드 -->
  <rect x="80" y="420" width="220" height="80" rx="12" fill="rgba(255,255,255,0.05)" stroke="rgba(245,158,11,0.2)" stroke-width="1"/>
  <text x="190" y="468" font-family="GmarketSansTTF,Arial,sans-serif" font-size="24" font-weight="900" fill="#FBBF24" text-anchor="middle">주택임대소득 분...</text>
  <rect x="320" y="420" width="220" height="80" rx="12" fill="rgba(255,255,255,0.05)" stroke="rgba(245,158,11,0.2)" stroke-width="1"/>
  <text x="430" y="468" font-family="GmarketSansTTF,Arial,sans-serif" font-size="24" font-weight="900" fill="#34D399" text-anchor="middle">주택임대소득 종...</text>
  <rect x="560" y="420" width="220" height="80" rx="12" fill="rgba(255,255,255,0.05)" stroke="rgba(245,158,11,0.2)" stroke-width="1"/>
  <text x="670" y="468" font-family="GmarketSansTTF,Arial,sans-serif" font-size="24" font-weight="900" fill="#60A5FA" text-anchor="middle">5월 종합소득세</text>

  <!-- 하단 브랜드 -->
  <text x="80" y="565" font-family="GmarketSansTTF,Arial,sans-serif" font-size="14" fill="rgba(255,255,255,0.3)">쉬운재테크 · easyzetec.com</text>
