  <!-- 메인 타이틀 -->
  <text x="80" y="205" font-family="GmarketSansTTF,Arial,sans-serif" font-size="72" font-weight="900" fill="white">주식 초보</text>

  <!-- 강조 서브타이틀 -->
  <rect x="80" y="228" width="924.2400000000005" height="54" rx="8" fill="#FBBF24"/>
