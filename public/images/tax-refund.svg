  <!-- 설명 -->
  <text x="80" y="355" font-family="Arial,sans-serif" font-size="22" fill="rgba(255,255,255,0.55)">매년 놓치는 세금 환급액, 혹시 연 100만원 이상일 수도 있다는 사실 아셨나요? 직장인 ...</text>

  <!-- 태그 카드 -->
  <rect x="80" y="420" width="220" height="80" rx="12" fill="rgba(255,255,255,0.05)" stroke="rgba(245,158,11,0.2)" stroke-width="1"/>
  <text x="190" y="468" font-family="Arial,sans-serif" font-size="24" font-weight="900" fill="#FBBF24" text-anchor="middle">세금 환급</text>
  <rect x="320" y="420" width="220" height="80" rx="12" fill="rgba(255,255,255,0.05)" stroke="rgba(245,158,11,0.2)" stroke-width="1"/>
  <text x="430" y="468" font-family="Arial,sans-serif" font-size="24" font-weight="900" fill="#34D399" text-anchor="middle">연말정산</text>
  <rect x="560" y="420" width="220" height="80" rx="12" fill="rgba(255,255,255,0.05)" stroke="rgba(245,158,11,0.2)" stroke-width="1"/>
  <text x="670" y="468" font-family="Arial,sans-serif" font-size="24" font-weight="900" fill="#60A5FA" text-anchor="middle">종합소득세</text>

