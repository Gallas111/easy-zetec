name: Daily Health Check

on:
  # schedule:
  #   - cron: '0 15 * * 3,6'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  health-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run health check
        id: health
        run: npx tsx scripts/health-check.ts
        continue-on-error: true

      - name: Auto-fix and commit
        if: steps.health.outcome == 'failure'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet && echo "No fixes to commit" && exit 0
          git commit -m "fix: 자동 건강 검사 수정 사항 반영"
          git push

      - name: Send health report
        if: always()
        continue-on-error: true
        run: |
          if [ "${{ steps.health.outcome }}" == "success" ]; then
            STATUS="✅ 모든 검사 통과"
          else
            STATUS="⚠️ 일부 문제 발견 (자동 수정 시도)"
          fi

          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d parse_mode="HTML" \
            -d text="🏥 <b>블로그 건강 검사 결과</b>%0A%0A${STATUS}%0A🌐 https://www.easyzetec.com"
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
