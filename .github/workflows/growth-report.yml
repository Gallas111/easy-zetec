name: 3-Day Growth Report

on:
  schedule:
    - cron: '0 15 * * 1'  # 매주 월요일 KST 00:00
  workflow_dispatch:

jobs:
  focused-report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Growth Report
        env:
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          GA_PROPERTY_ID: ${{ secrets.GA_PROPERTY_ID }}
          GSC_SITE_URL: ${{ secrets.GSC_SITE_URL }}
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
          EMAIL_RECEIVER: ${{ secrets.EMAIL_RECEIVER }}
          GOOGLE_CREDENTIALS_BASE64: ${{ secrets.GOOGLE_CREDENTIALS_BASE64 }}
        run: |
          echo "📊 쉬운재테크 성장 리포트 생성..."
          npx tsx scripts/generate-focused-report.ts

      - name: Notify Telegram
        if: always()
        continue-on-error: true
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            MSG="📊 [쉬운재테크] 3일 성장 리포트가 이메일로 발송되었습니다."
          else
            MSG="❌ [쉬운재테크] 성장 리포트 생성 실패. GitHub Actions 로그를 확인하세요."
          fi
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d text="$MSG"
