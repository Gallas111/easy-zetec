name: Daily Content Generation

on:
  schedule:
    # KST 07:00 = UTC 22:00
    - cron: '0 22 * * *'
  workflow_dispatch:
    inputs:
      post_count:
        description: '생성할 포스트 수'
        required: false
        default: '2'

permissions:
  contents: write

jobs:
  generate-content:
    runs-on: ubuntu-latest
    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      SEARCHAPI_API_KEY: ${{ secrets.SEARCHAPI_API_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Send start notification
        if: always()
        continue-on-error: true
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d parse_mode="HTML" \
            -d text="🚀 <b>쉬운재테크 블로그</b>%0A%0A콘텐츠 자동 생성을 시작합니다.%0A📝 목표: ${{ github.event.inputs.post_count || '5' }}개 포스트%0A🌐 https://www.easyzetec.com"

      - name: Generate blog posts
        id: generate
        run: npx tsx scripts/generate-seo-post.ts
        env:
          POST_COUNT: ${{ github.event.inputs.post_count || '5' }}

      - name: Refine content
        if: steps.generate.outputs.POST_COUNT != '0'
        run: npx tsx scripts/content-refiner.ts
        continue-on-error: true

      - name: Optimize internal links
        if: steps.generate.outputs.POST_COUNT != '0'
        run: npx tsx scripts/internal-linker.ts
        continue-on-error: true

      - name: Generate images
        if: steps.generate.outputs.POST_COUNT != '0'
        run: npx tsx scripts/generate-images.ts

      - name: Generate sitemap
        run: npx tsx scripts/generate-sitemap.ts

      - name: Generate RSS feed
        run: npx tsx scripts/generate-rss.ts

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet && echo "No changes to commit" && exit 0
          git commit -m "feat: 자동 생성 콘텐츠 (${{ steps.generate.outputs.POST_COUNT || '0' }}개 포스트)

          생성된 포스트: ${{ steps.generate.outputs.POST_SLUGS || 'none' }}"
          git push

      - name: Ping Google Sitemap
        if: steps.generate.outputs.POST_COUNT != '0'
        continue-on-error: true
        run: |
          curl -s "https://www.google.com/ping?sitemap=https://www.easyzetec.com/sitemap.xml"
          echo "Sitemap ping sent to Google"

      - name: Send success notification
        if: success()
        continue-on-error: true
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d parse_mode="HTML" \
            -d text="✅ <b>콘텐츠 생성 완료!</b>%0A%0A📝 생성된 포스트: ${{ steps.generate.outputs.POST_COUNT || '0' }}개%0A📄 슬러그: ${{ steps.generate.outputs.POST_SLUGS || 'none' }}%0A🌐 https://www.easyzetec.com"

      - name: Send failure notification
        if: failure()
        continue-on-error: true
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d parse_mode="HTML" \
            -d text="❌ <b>콘텐츠 생성 실패!</b>%0A%0A🔗 ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}%0A🌐 https://www.easyzetec.com"
